name: Auto-Export Telegram Channels

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:        # Allow manual trigger

jobs:
  export:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Telegram Exporter
      run: python main.py
      
    - name: Commit and push to export branch
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Create or checkout export branch
        git checkout --orphan export-branch
        git rm -rf .
        
        # Add only export files, keep repo clean
        if [ -d "export" ]; then
          cp -r export/* .
        fi
        
        git add *.json
        
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update channel exports [skip ci]"
          git push --force origin HEAD:export
        fi
